            font-size: 16px;
            border-radius: 50px;

            margin-top: 20px;
        }
        
        .button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(118, 75, 162, 0.3);
        }
        
        .button:active {
            transform: translateY(0);
        }
        
        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 30px;
            justify-content: center;
        }
        
        .button-secondary {
            background: #f0f0f0;
            color: #764ba2;
            flex: 1;
            font-size: 14px;
            padding: 12px 20px;
        }
        
        .button-secondary:hover {

        }
        
        .footer {
            margin-top: 40px;
            color: #999;
            font-size: 12px;
        }
        
        .scan-count {
            color: #764ba2;
            font-size: 14px;
            margin-top: 20px;
            font-weight: 600;
            background: #f5f5f5;
            padding: 10px;
            border-radius: 5px;
        }
        
        .loading {
            display: none;
        }
        
        .loading.active {
            display: block;
            color: #764ba2;
            font-size: 18px;
            margin: 20px 0;

        function getRandomVerse() {
            return topVerses[Math.floor(Math.random() * topVerses.length)];
        }

        function loadVerse() {
            // Simulate loading delay for better UX
            setTimeout(() => {
                const verse = getRandomVerse();
                document.getElementById('verseText').textContent = verse.text;
                document.getElementById('verseRef').textContent = verse.ref;
                
                // Track scans
                const scanCount = parseInt(sessionStorage.getItem('scanCount') || '0') + 1;
                sessionStorage.setItem('scanCount', scanCount);
                document.getElementById('scanNumber').textContent = scanCount;
                
                // Hide loading, show verse
                document.getElementById('loadingSpinner').classList.remove('active');
                document.getElementById('verseContent').style.display = 'block';
            }, 500);
        }

        function shareVerse() {
            const verseText = document.getElementById('verseText').textContent;
            const verseRef = document.getElementById('verseRef').textContent;
            const shareText = `"${verseText}" - ${verseRef}\n\n☕ 🙏 Sip with Faith`;
            
            if (navigator.share) {
                navigator.share({
                    title: 'Sip with Faith',
                    text: shareText,
                    url: window.location.href
                });
            } else {
                copyVerse();
            }
        }

        function copyVerse() {
            const verseText = document.getElementById('verseText').textContent;
            const verseRef = document.getElementById('verseRef').textContent;
            const fullText = `"${verseText}" - ${verseRef}`;
            
            navigator.clipboard.writeText(fullText).then(() => {
                alert('Verse copied to clipboard! 📋');
            });
        }

        // Load verse on page load
        window.addEventListener('load', loadVerse);
