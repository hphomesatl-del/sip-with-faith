            <div class="subtitle">Scan for a daily verse</div>
        </div>
        <div class="footer">
            ☕ 🙏 Get inspired daily
        </div>
    </div>

    <script>
        new QRCode(document.getElementById("qrcode"), {
            text: "https://sip-with-faith.vercel.app",
            width: 110,
            height: 110,
            colorDark: "#6f42c1",
            colorLight: "#ffffff",
            correctLevel: QRCode.CorrectLevel.H
        });
    </script>
