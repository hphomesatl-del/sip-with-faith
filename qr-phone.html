<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sip with Faith - QR Code Card</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: #f5f5f5;
            font-family: 'Georgia', serif;
            padding: 20px;
        }
        
        .card {
            width: 320px;
            height: 500px;
            border: 12px solid #d32f2f;
            background: white;
            display: flex;
            flex-direction: column;
            box-shadow: 0 8px 24px rgba(0,0,0,0.3);
            overflow: hidden;
            border-radius: 8px;
        }
        
        .header {
            background-image: url('./bg-landscape.jpg');
            background-size: cover;
            background-position: center;
            height: 140px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }
        
        .title-section {
            text-align: center;
            padding: 10px 10px 5px 10px;
            background: white;
        }
        
        .title-section h1 {
            font-size: 22px;
            color: #6f42c1;
            margin: 0;
            font-weight: bold;
        }
        
        .title-section p {
            font-size: 11px;
            color: #666;
            margin: 3px 0 0 0;
        }
        
        .qr-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background: white;
        }
        
        #qrcode {
            background: white;
            padding: 10px;
            border-radius: 4px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        
        .subtitle {
            text-align: center;
            margin-top: 12px;
            font-size: 11px;
            color: #666;
            font-style: italic;
        }
        
        .footer {
            padding: 12px;
            text-align: center;
            background: #f9f9f9;
            border-top: 1px solid #eee;
            font-size: 10px;
            color: #999;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="header">
        </div>
        
        <div class="title-section">
            <h1>☕ Sip with Faith 🙏</h1>
            <p>Daily Bible Verses</p>
        </div>
        
        <div class="qr-section">
            <div id="qrcode"></div>
            <p class="subtitle">Scan for daily verses</p>
        </div>
        
        <div class="footer">
            <p>hphomesatl-del.github.io/sip-with-faith</p>
        </div>
    </div>

    <script>
        // Create QR code linking to the main app
        new QRCode(document.getElementById("qrcode"), {
            text: "https://hphomesatl-del.github.io/sip-with-faith",
            width: 100,
            height: 100,
            colorDark: "#6f42c1",
            colorLight: "#ffffff",
            correctLevel: QRCode.CorrectLevel.H
        });
    </script>
</body>
</html>
