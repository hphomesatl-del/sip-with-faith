<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sip with Faith QR</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: Georgia, serif;
        }
        .qr-container {
            text-align: center;
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
        }
        h1 {
            font-size: 24px;
            color: #333;
            margin-bottom: 10px;
        }
        p {
            color: #666;
            margin-bottom: 20px;
            font-size: 14px;
        }
        #qrcode {
            display: inline-block;
            padding: 20px;
            background: white;
        }
    </style>
</head>
<body>
    <div class="qr-container">
        <h1>☕ Sip with Faith</h1>
        <p>Scan to receive a random Bible verse</p>
        <div id="qrcode"></div>
    </div>

    <script>
        new QRCode(document.getElementById("qrcode"), {
            text: "https://sip-with-faith.vercel.app",
            width: 200,
            height: 200,
            colorDark: "#764ba2",
            colorLight: "#ffffff"
        });
    </script>
</body>
</html>
